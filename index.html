<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Raid & Dragon RPG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui">
    <header id="top-bar">
      <div id="player-info">
        Lv: <span id="player-level">1</span>
        ／ 所持金: <span id="player-gold">0</span> ドラ
      </div>
      <div id="menu-buttons">
        <button id="btn-menu">メニュー</button>
      </div>
      <div id="notice">
        <strong>お知らせ：</strong>
        <span id="notice-text">ようこそ。ゲーム仕様はすべて完成しています。</span>
      </div>
    </header>

    <main id="main">
      <section id="status-panel">
        <h2>プレイヤー情報</h2>
        <pre id="player-status"></pre>
      </section>

      <section id="weapon-panel">
        <h2>武器一覧</h2>
        <div id="weapon-list"></div>
      </section>

      <section id="log-panel">
        <h2>ログ</h2>
        <div id="log"></div>
      </section>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
