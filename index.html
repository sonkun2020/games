<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Raid & Dragon RPG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="menu">
    <h2>メニュー</h2>

    <button id="btn-start">ゲーム開始</button>

    <h3>武器変更</h3>
    <select id="weapon-select">
        <option value="0">Sword</option>
        <option value="1">Spear</option>
        <option value="2">Axe</option>
        <option value="3">Dragon Sword</option>
    </select>

    <h3>ステータス</h3>
    <div id="status-box"></div>

    <h3>設定</h3>
    <button id="btn-sound">音：ON</button>

    <button id="btn-close-menu">閉じる</button>
</div>

<button id="btn-open-menu">≡</button>

  <div id="ui">
    <div id="player-hp"></div>
    <div id="dragon-bar"></div>
    <div id="enemy-hp"></div>
    <div id="log"></div>
    <div id="skills">
    <div class="skill" id="skill1">1</div>
    <div class="skill" id="skill2">2</div>
    <div class="skill" id="skill3">3</div>
</div>
<audio id="se-attack" src="se/attack.mp3"></audio>
<audio id="se-skill" src="se/skill.mp3"></audio>
<audio id="se-hit" src="se/hit.mp3"></audio>
<audio id="se-dragon" src="se/dragon.mp3"></audio>

</div>

  <div id="ui-root">
    <header id="top-bar">
      <div id="player-info">
        Lv: <span id="player-level">1</span>
        ／ 所持金: <span id="player-gold">0</span> ドラ
      </div>
      <div id="menu-buttons">
        <button id="btn-menu">メニュー</button>
      </div>
      <div id="notice">
        <strong>お知らせ：</strong>
        <span id="notice-text">ゲーム仕様はすべて反映済みです。</span>
      </div>
    </header>

    <main id="main">
      <section id="left-panel">
        <h2>マップ</h2>
        <canvas id="game-canvas" width="640" height="480"></canvas>
        <div class="hint">
          移動：WASD ／ 攻撃：J（通常） ／ スキル1：K
        </div>
      </section>

      <section id="center-panel">
        <h2>プレイヤー情報</h2>
        <pre id="player-status"></pre>

        <h2>装備武器</h2>
        <div id="weapon-info"></div>

        <h2>敵情報</h2>
        <pre id="enemy-status"></pre>
      </section>

      <section id="right-panel">
        <h2>ログ</h2>
        <div id="log"></div>
      </section>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
