<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Raid & Dragon RPG</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui-root">
    <header id="top-bar">
      <div id="player-info">
        Lv: <span id="player-level">1</span>
        ／ 所持金: <span id="player-gold">0</span> ドラ
      </div>
      <div id="menu-buttons">
        <button id="btn-menu">メニュー</button>
      </div>
      <div id="notice">
        <strong>お知らせ：</strong>
        <span id="notice-text">ゲーム仕様はすべて反映済みです。</span>
      </div>
    </header>

    <main id="main">
      <section id="left-panel">
        <h2>マップ</h2>
        <canvas id="game-canvas" width="640" height="480"></canvas>
        <div class="hint">
          移動：WASD ／ 攻撃：J（通常） ／ スキル1：K
        </div>
      </section>

      <section id="center-panel">
        <h2>プレイヤー情報</h2>
        <pre id="player-status"></pre>

        <h2>装備武器</h2>
        <div id="weapon-info"></div>

        <h2>敵情報</h2>
        <pre id="enemy-status"></pre>
      </section>

      <section id="right-panel">
        <h2>ログ</h2>
        <div id="log"></div>
      </section>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
